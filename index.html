<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Task Garden</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>🌸 My Task Garden 🌸</h1>
            <p>Organize your day beautifully</p>
        </div>

        <div class="input-section">
            <input type="text" id="taskInput" placeholder="Plant a new task...">
            <button id="addBtn">➕ Add</button>
        </div>

        <p id="taskCount">🌷 Total Tasks: 0</p>

        <ul id="taskList"></ul>

        <p id="emptyMsg">🌼 No tasks blooming yet</p>
    </div>

    <script src="index.js"></script>
</body>
</html>
